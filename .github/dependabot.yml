version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    # Bundle minor + patch bumps into a few weekly group PRs to avoid the
    # whack-a-mole of one-PR-per-package. Major bumps fall through to the
    # ignore list below (and so are dropped, not grouped).
    groups:
      dev-tools:
        patterns:
          - "@types/*"
          - "ts-*"
          - "@playwright/*"
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "postcss"
          - "autoprefixer"
          - "tailwindcss"
          - "jest"
          - "@nestjs/cli"
          - "@nestjs/schematics"
          - "@nestjs/testing"
          - "typescript"
        update-types: ["minor", "patch"]
      api-runtime:
        patterns:
          - "@nestjs/common"
          - "@nestjs/config"
          - "@nestjs/core"
          - "@nestjs/jwt"
          - "@nestjs/passport"
          - "@nestjs/platform-express"
          - "@nestjs/schedule"
          - "@nestjs/throttler"
          - "@prisma/client"
          - "prisma"
          - "ioredis"
          - "nodemailer"
          - "passport*"
          - "rxjs"
          - "class-*"
          - "reflect-metadata"
          - "helmet"
          - "cookie-parser"
          - "handlebars"
          - "libphonenumber-js"
          - "multer"
          - "sanitize-html"
          - "uuid"
          - "apify-client"
        update-types: ["minor", "patch"]
      web-runtime:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@hookform/*"
          - "react-hook-form"
          - "react-easy-crop"
          - "@tanstack/*"
          - "primereact"
          - "primeicons"
          - "lucide-react"
          - "zod"
          - "@vercel/*"
        update-types: ["minor", "patch"]
    # Defer major-version bumps for frameworks until coordinated upgrade workstreams.
    # Lift on a per-family basis when ready. See closed PRs #25, #26, #29, #32.
    ignore:
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # eslint 10 not yet supported by eslint-config-next; eslint-config-next 16 paired with Next 16.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      # @hookform/resolvers 5.x: review form schema patterns first.
      - dependency-name: "@hookform/resolvers"
        update-types: ["version-update:semver-major"]
      # Prisma 7 has known breaking changes (deprecated package.json#prisma config); coordinated upgrade.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      # uuid 14 changed exports; needs sweep across import sites.
      - dependency-name: "uuid"
        update-types: ["version-update:semver-major"]
      # @types/ioredis 5 paired with ioredis 5; skip until ioredis itself bumps.
      - dependency-name: "@types/ioredis"
        update-types: ["version-update:semver-major"]
