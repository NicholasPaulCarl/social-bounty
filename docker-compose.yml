version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: social-bounty-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: social-bounty-mail
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8025 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
