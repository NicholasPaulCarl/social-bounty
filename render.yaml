# Render Blueprint — Social Bounty (API + Web)
# https://render.com/docs/blueprint-spec
#
# Deploys both the NestJS API and Next.js web frontend on Render.
# Redis + Postgres (Supabase) are external — no Render add-ons needed.
#
# API service (social-bounty-api):
#  1. Builds Docker image at apps/api/Dockerfile (multi-stage, ~180MB).
#  2. Runs `prisma migrate deploy` via preDeployCommand BEFORE traffic switch.
#     If migrations fail, deploy aborts and old instance keeps serving.
#  3. Listens on port 3001 with health-check via TCP probe.
#
# Web service (social-bounty-web):
#  1. Builds Docker image at apps/web/Dockerfile (multi-stage, ~150MB).
#  2. Serves Next.js static + ISR at port 3000.
#  3. Configured with NEXT_PUBLIC_API_URL pointing to API endpoint.
#
# After first apply via the Render dashboard (see docs/deployment/
# render-deploy.md), subsequent pushes to `main` auto-deploy both services.

services:
  - type: web
    name: social-bounty-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    # Frankfurt is Render's closest region to South Africa (~150ms round-trip
    # to Johannesburg vs ~250ms from Oregon). Match Supabase eu-west-3 region.
    region: frankfurt
    # Starter: $7/mo, 512MB RAM, 0.5 CPU — enough for the API + schedulers.
    # Bump to `standard` ($25/mo, 2GB RAM, 1 CPU) once real load lands.
    plan: starter
    # Only main deploys. Feature branches can still trigger CI but won't
    # touch production infra.
    branch: main
    autoDeploy: true
    # Runs BEFORE the new instance takes traffic. The old instance keeps
    # serving until this command exits 0. Prisma migrations are idempotent
    # (batch 13A pattern) so retries are safe.
    #
    # Prisma CLI is installed globally in the runtime Docker image (see
    # apps/api/Dockerfile), so `prisma` is always on PATH here.
    preDeployCommand: prisma migrate deploy --schema=packages/prisma/schema.prisma
    # Render polls this until it responds; when it does, the deploy flips
    # live. The API has no /healthz endpoint today — Render falls back to
    # a TCP probe on $PORT, which is fine for now. Add a /api/v1/health
    # endpoint later if you want HTTP-level health.
    # healthCheckPath: /api/v1/health
    envVars:
      # ─── Runtime ────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # ─── Secrets (sync: false → Render prompts in the dashboard) ──
      # Never commit these. Paste into Render's env var UI on first apply;
      # Render stores them encrypted and injects at runtime.

      # Database — Supabase pooler for runtime, direct for migrations
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # Redis (Upstash / external)
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_DB
        value: "0"

      # Auth
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d

      # TradeSafe GraphQL rail (ADR 0011 — single inbound + outbound rail)
      - key: TRADESAFE_AUTH_URL
        value: https://auth.tradesafe.co.za/oauth/token
      - key: TRADESAFE_GRAPHQL_URL
        value: https://api.tradesafe.co.za/graphql
      - key: TRADESAFE_CLIENT_ID
        sync: false
      - key: TRADESAFE_CLIENT_SECRET
        sync: false
      # Set to "false" once TradeSafe issues prod OAuth creds (R24).
      # Mock mode returns fake checkout URLs — no real money moves.
      - key: TRADESAFE_MOCK
        value: "true"
      - key: TRADESAFE_CALLBACK_SECRET
        sync: false
      - key: TRADESAFE_REDIRECT_URL
        value: https://app.socialbounty.cash/business/bounties/funded
      - key: TRADESAFE_OAUTH_REDIRECT_URL
        value: https://api.socialbounty.cash/api/v1/auth/tradesafe/callback
      - key: TRADESAFE_SUCCESS_URL
        value: https://app.socialbounty.cash/hunters/me?tradesafe=linked
      - key: TRADESAFE_FAILURE_URL
        value: https://app.socialbounty.cash/hunters/me?tradesafe=failed

      # Provider-agnostic system actor for webhook/scheduler AuditLog writes.
      # Must be a real users.id row (SUPER_ADMIN). Paste in the Render UI.
      - key: SYSTEM_ACTOR_ID
        sync: false

      # Payout + financial gates
      - key: PAYOUTS_ENABLED
        value: "false"
      - key: PAYOUT_PROVIDER
        value: tradesafe
      - key: RECONCILIATION_ENABLED
        value: "true"
      - key: BENEFICIARY_ENC_KEY
        sync: false

      # Apify
      - key: APIFY_API_TOKEN
        sync: false
      - key: APIFY_ACTOR_TIMEOUT_MS
        value: "60000"

      # Mail (SMTP — replace with real provider on first live sends)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@socialbounty.cash

      # Observability (optional on first boot)
      - key: SENTRY_DSN
        sync: false

      # CORS — production web origins. The API parses this as a comma-
      # separated list (apps/api/src/main.ts:64), so include every host
      # the frontend can be reached at. `app.socialbounty.cash` is reserved
      # for the future authenticated app subdomain — currently the
      # marketing site + auth pages live at the apex and `www`.
      - key: CORS_ORIGIN
        value: https://www.socialbounty.cash,https://socialbounty.cash,https://app.socialbounty.cash

      # SMS (Brevo Transactional SMS — Wave 1C). Set SMS_ENABLED to "true"
      # and paste BREVO_API_KEY + BREVO_SMS_SENDER in the Render UI to
      # activate OTP delivery via SMS.
      - key: SMS_ENABLED
        value: "false"
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SMS_SENDER
        sync: false
      - key: BREVO_SMS_DEFAULT_REGION
        value: "ZA"

  - type: web
    name: social-bounty-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    # Match API region for co-location.
    region: frankfurt
    # Starter plan sufficient for frontend.
    plan: starter
    # Only main deploys.
    branch: main
    autoDeploy: true
    # Health-check: TCP probe on port 3000 (Next.js listening).
    # Add a /api/health endpoint later if you want HTTP-level health.
    # healthCheckPath: /
    envVars:
      # ─── Runtime ────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

      # ─── API Connectivity ──────────────────────────────
      # Points to the API endpoint. Must be HTTPS for production.
      - key: NEXT_PUBLIC_API_URL
        value: https://api.socialbounty.cash/api/v1
